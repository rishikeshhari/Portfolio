<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Image Slider</title>

<style>
body {
text-align: center;
font-family: Arial, sans-serif;
background: #f5f5f5;
padding: 20px;
}

.slider {
position: relative;
width: 500px;
height: 300px;
margin: auto;
overflow: hidden;
border-radius: 10px;
box-shadow: 0 0 10px #aaa;
}

.slides {
display: flex;
width: 100%;
height: 100%;
transition: transform 0.5s ease;
}

.slides img {
width: 500px;
height: 300px;
object-fit: cover;
}

/* Buttons */
.btn {
position: absolute;
top: 50%;
transform: translateY(-50%);
font-size: 24px;
background: rgba(0,0,0,0.5);
color: white;
border: none;
padding: 10px;
cursor: pointer;
border-radius: 50%;
}
.prev { left: 10px; }
.next { right: 10px; }
</style>

</head>
<body>

<h2>Image Slider</h2>

<div class="slider">
<div class="slides" id="slides">
<img src="D:\Rishi\HTML\im1.png" alt="">
<img src="D:\Rishi\HTML\im2.png" alt="">
<img src="D:\Rishi\HTML\im3.png" alt="">
</div>

<button class="btn prev" onclick="prevSlide()">&#10094;</button>
<button class="btn next" onclick="nextSlide()">&#10095;</button>
</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;
function showSlide() {
slides.style.transform = `translateX(-${index * 500}px)`;
}

function nextSlide() {
index = (index + 1) % totalSlides;
showSlide();
}

function prevSlide() {
index = (index - 1 + totalSlides) % totalSlides;
showSlide();
}
</script>

</body>
</html>
